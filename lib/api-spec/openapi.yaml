          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /staff/employees/{id}:
    get:
      operationId: getEmployee
      tags: [staff]
      summary: Get employee details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

    patch:
      operationId: updateEmployee
      tags: [staff]
      summary: Update employee
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /staff/clock-in:
    post:
      operationId: clockIn
      tags: [staff]
      summary: Clock in to shift
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockEventInput"
      responses:
        "201":
          description: Clocked in
          content:
