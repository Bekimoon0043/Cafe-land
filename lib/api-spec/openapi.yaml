# ─── COMPONENTS ───────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── AUTH ──────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, role, employeeId]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, manager, cashier, kitchen]
        employeeId:
          type: ["integer", "null"]
        branchId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    # ── MENU ──────────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, nameEn, nameAm, sortOrder]
      properties:
        id:
          type: integer
        nameEn:
          type: string
        nameAm:
          type: string
        parentId:
          type: ["integer", "null"]
        icon:
          type: ["string", "null"]
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [nameEn, nameAm]
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        parentId:
          type: ["integer", "null"]
        icon:
          type: ["string", "null"]
        sortOrder:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        parentId:
          type: ["integer", "null"]
        icon:
          type: ["string", "null"]
        sortOrder:
          type: integer

    MenuItem:
      type: object
      required: [id, nameEn, nameAm, categoryId, price, isAvailable, prepTimeMinutes]
      properties:
        id:
          type: integer
        nameEn:
          type: string
        nameAm:
          type: string
        descriptionEn:
          type: ["string", "null"]
        descriptionAm:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        prepTimeMinutes:
          type: integer
        branchId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    MenuItemDetail:
      allOf:
        - $ref: "#/components/schemas/MenuItem"
        - type: object
          properties:
            modifierGroups:
              type: array
              items:
                $ref: "#/components/schemas/ModifierGroup"

    MenuItemInput:
      type: object
      required: [nameEn, nameAm, categoryId, price, prepTimeMinutes]
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        descriptionEn:
          type: ["string", "null"]
        descriptionAm:
          type: ["string", "null"]
        categoryId:
          type: integer
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        prepTimeMinutes:
          type: integer
        branchId:
          type: ["integer", "null"]

    MenuItemUpdate:
      type: object
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        descriptionEn:
          type: ["string", "null"]
        descriptionAm:
          type: ["string", "null"]
        categoryId:
          type: integer
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        prepTimeMinutes:
          type: integer

    ModifierGroup:
      type: object
      required: [id, nameEn, nameAm, minSelect, maxSelect, menuItemIds, modifiers]
      properties:
        id:
          type: integer
        nameEn:
          type: string
        nameAm:
          type: string
        minSelect:
          type: integer
        maxSelect:
          type: integer
        menuItemIds:
          type: array
          items:
            type: integer
        modifiers:
          type: array
          items:
            $ref: "#/components/schemas/Modifier"

    Modifier:
      type: object
      required: [id, groupId, nameEn, nameAm, priceDelta]
      properties:
        id:
          type: integer
        groupId:
          type: integer
        nameEn:
          type: string
        nameAm:
          type: string
        priceDelta:
          type: number

    ModifierGroupInput:
      type: object
      required: [nameEn, nameAm, minSelect, maxSelect, modifiers, menuItemIds]
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        minSelect:
          type: integer
        maxSelect:
          type: integer
        menuItemIds:
          type: array
          items:
            type: integer
        modifiers:
          type: array
          items:
            $ref: "#/components/schemas/ModifierInput"

    ModifierInput:
      type: object
      required: [nameEn, nameAm, priceDelta]
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        priceDelta:
          type: number

    ModifierGroupUpdate:
      type: object
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        minSelect:
          type: integer
        maxSelect:
          type: integer
        menuItemIds:
          type: array
          items:
            type: integer
        modifiers:
          type: array
          items:
            $ref: "#/components/schemas/ModifierInput"

    Combo:
      type: object
      required: [id, nameEn, nameAm, price, isAvailable, items]
      properties:
        id:
          type: integer
        nameEn:
          type: string
        nameAm:
          type: string
        descriptionEn:
          type: ["string", "null"]
        descriptionAm:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/ComboItem"
        createdAt:
          type: string
          format: date-time

    ComboItem:
      type: object
      required: [menuItemId, quantity]
      properties:
        menuItemId:
          type: integer
        menuItemName:
          type: ["string", "null"]
        quantity:
          type: integer

    ComboInput:
      type: object
      required: [nameEn, nameAm, price, items]
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        descriptionEn:
          type: ["string", "null"]
        descriptionAm:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/ComboItem"

    ComboUpdate:
      type: object
      properties:
        nameEn:
          type: string
        nameAm:
          type: string
        descriptionEn:
          type: ["string", "null"]
        descriptionAm:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/ComboItem"

    # ── ORDERS ────────────────────────────────────────────────────────────────
    Order:
      type: object
      required: [id, orderNumber, orderType, status, totalAmount, createdAt]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        orderType:
          type: string
          enum: [dine_in, takeaway, delivery]
        status:
          type: string
          enum: [pending, preparing, ready, served, completed, cancelled]
        tableId:
          type: ["integer", "null"]
        tableLabel:
          type: ["string", "null"]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        staffId:
          type: ["integer", "null"]
        staffName:
          type: ["string", "null"]
        totalAmount:
          type: number
        discountAmount:
          type: number
        taxAmount:
          type: number
        notes:
          type: ["string", "null"]
        deliveryAddress:
          type: ["string", "null"]
        branchId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrderItem"
            payment:
              $ref: "#/components/schemas/Payment"

    OrderItem:
      type: object
      required: [id, orderId, menuItemId, nameEn, nameAm, quantity, unitPrice, totalPrice]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        menuItemId:
          type: integer
        nameEn:
          type: string
        nameAm:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number
        selectedModifiers:
          type: array
          items:
            $ref: "#/components/schemas/SelectedModifier"
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, preparing, ready]

    SelectedModifier:
      type: object
      required: [modifierId, nameEn, nameAm, priceDelta]
      properties:
        modifierId:
          type: integer
        nameEn:
          type: string
        nameAm:
          type: string
        priceDelta:
          type: number

    OrderInput:
      type: object
      required: [orderType, items]
      properties:
        orderType:
          type: string
          enum: [dine_in, takeaway, delivery]
        tableId:
          type: ["integer", "null"]
        customerId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        deliveryAddress:
          type: ["string", "null"]
        discountAmount:
          type: number
        branchId:
          type: ["integer", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItemInput:
      type: object
      required: [menuItemId, quantity, unitPrice]
      properties:
        menuItemId:
          type: integer
        quantity:
          type: integer
        unitPrice:
          type: number
        selectedModifiers:
          type: array
          items:
            $ref: "#/components/schemas/SelectedModifier"
        notes:
          type: ["string", "null"]

    OrderUpdate:
      type: object
      properties:
        notes:
          type: ["string", "null"]
        tableId:
          type: ["integer", "null"]
        customerId:
          type: ["integer", "null"]
        discountAmount:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, preparing, ready, served, completed, cancelled]

    CancelOrderInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    KdsOrder:
      type: object
      required: [id, orderNumber, orderType, tableLabel, items, createdAt, elapsedMinutes]
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        orderType:
          type: string
          enum: [dine_in, takeaway, delivery]
        tableLabel:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
