      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /inventory/suppliers/{id}:
    patch:
      operationId: updateSupplier
      tags: [inventory]
      summary: Update a supplier
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

    delete:
      operationId: deleteSupplier
      tags: [inventory]
      summary: Delete a supplier
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inventory/purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [inventory]
      summary: List purchase orders
      parameters:
        - name: supplierId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"

    post:
      operationId: createPurchaseOrder
      tags: [inventory]
      summary: Log a purchase order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderInput"
      responses:
