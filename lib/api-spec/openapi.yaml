      operationId: getLowStockAlerts
      tags: [inventory]
      summary: Get ingredients below reorder threshold
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"

  /inventory/suppliers:
    get:
      operationId: listSuppliers
      tags: [inventory]
