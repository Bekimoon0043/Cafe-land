    post:
      operationId: createWasteLog
      tags: [inventory]
      summary: Log a waste/spoilage event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WasteLogInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WasteLog"

  /inventory/recipes:
    get:
      operationId: listRecipes
      tags: [inventory]
      summary: List item-ingredient recipes (BOM)
      responses:
        "200":
          description: Recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"

    post:
      operationId: createRecipe
      tags: [inventory]
      summary: Create/update recipe for a menu item
      security:
        - bearerAuth: []
      requestBody:
        required: true
